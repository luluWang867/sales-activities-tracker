<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Sales Activities Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">📊</span>
          <div class="logo-text">
            <span class="logo-title">Sales Tracker</span>
            <span class="logo-org">SELF</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" data-view="dashboard" href="#">
          <span class="nav-icon">🏠</span>
          <span>Dashboard</span>
        </a>
        <a class="nav-item" data-view="daily" href="#">
          <span class="nav-icon">📅</span>
          <span>Daily Log</span>
        </a>
        <a class="nav-item" data-view="contractors" href="#">
          <span class="nav-icon">🔨</span>
          <span>Contractors</span>
        </a>
        <a class="nav-item" data-view="goals" href="#">
          <span class="nav-icon">🎯</span>
          <span>Goals</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-date" id="sidebarDate"></div>
      </div>
    </aside>

    <!-- Main wrapper -->
    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebarToggle">☰</button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-right" id="topbarActions"></div>
      </header>

      <main class="main-content" id="mainContent">
        <!-- Rendered dynamically -->
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Modal</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
